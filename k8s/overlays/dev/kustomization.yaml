apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: mcp-git-intel-dev

namePrefix: dev-

resources:
  - ../../base

patches:
  - patch: |-
      apiVersion: apps/v1
      kind: Deployment
      metadata:
        name: mcp-git-intel
      spec:
        replicas: 1
        template:
          spec:
            containers:
              - name: mcp-git-intel
                resources:
                  requests:
                    cpu: 50m
                    memory: 64Mi
                  limits:
                    cpu: 500m
                    memory: 256Mi
  - patch: |-
      apiVersion: autoscaling/v2
      kind: HorizontalPodAutoscaler
      metadata:
        name: mcp-git-intel
      spec:
        minReplicas: 1
        maxReplicas: 3
  - patch: |-
      apiVersion: policy/v1
      kind: PodDisruptionBudget
      metadata:
        name: mcp-git-intel
      spec:
        minAvailable: 0

commonLabels:
  environment: dev

apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: mcp-git-intel-staging

namePrefix: staging-

resources:
  - ../../base

patches:
  - patch: |-
      apiVersion: apps/v1
      kind: Deployment
      metadata:
        name: mcp-git-intel
      spec:
        replicas: 2
        template:
          spec:
            containers:
              - name: mcp-git-intel
                resources:
                  requests:
                    cpu: 100m
                    memory: 128Mi
                  limits:
                    cpu: "1"
                    memory: 512Mi
  - patch: |-
      apiVersion: autoscaling/v2
      kind: HorizontalPodAutoscaler
      metadata:
        name: mcp-git-intel
      spec:
        minReplicas: 2
        maxReplicas: 5

commonLabels:
  environment: staging

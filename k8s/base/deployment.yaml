apiVersion: apps/v1
kind: Deployment
metadata:
  name: mcp-git-intel
  namespace: mcp-git-intel
  labels:
    app.kubernetes.io/name: mcp-git-intel
    app.kubernetes.io/component: server
    app.kubernetes.io/version: '1.0.0'
spec:
  replicas: 2
  revisionHistoryLimit: 5
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app.kubernetes.io/name: mcp-git-intel
      app.kubernetes.io/component: server
  template:
    metadata:
      labels:
        app.kubernetes.io/name: mcp-git-intel
        app.kubernetes.io/component: server
        app.kubernetes.io/version: '1.0.0'
      annotations:
        kubectl.kubernetes.io/default-container: mcp-git-intel
    spec:
      serviceAccountName: mcp-git-intel
      automountServiceAccountToken: false
      terminationGracePeriodSeconds: 30

      securityContext:
        runAsNonRoot: true
        runAsUser: 1001
        runAsGroup: 1001
        fsGroup: 1001
        seccompProfile:
          type: RuntimeDefault

      containers:
        - name: mcp-git-intel
          image: mcp-git-intel:latest
          imagePullPolicy: IfNotPresent

          envFrom:
            - configMapRef:
                name: mcp-git-intel-config

          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: '1'
              memory: 512Mi

          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            runAsNonRoot: true
            runAsUser: 1001
            capabilities:
              drop:
                - ALL

          volumeMounts:
            - name: repo
              mountPath: /repo
              readOnly: true
            - name: tmp
              mountPath: /tmp

          livenessProbe:
            exec:
              command:
                - node
                - -e
                - 'process.exit(0)'
            initialDelaySeconds: 10
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 3

          readinessProbe:
            exec:
              command:
                - node
                - -e
                - 'process.exit(0)'
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3

      volumes:
        - name: repo
          persistentVolumeClaim:
            claimName: mcp-git-intel-repo
        - name: tmp
          emptyDir:
            sizeLimit: 64Mi

      topologySpreadConstraints:
        - maxSkew: 1
          topologyKey: topology.kubernetes.io/zone
          whenUnsatisfiable: DoNotSchedule
          labelSelector:
            matchLabels:
              app.kubernetes.io/name: mcp-git-intel

      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                labelSelector:
                  matchExpressions:
                    - key: app.kubernetes.io/name
                      operator: In
                      values:
                        - mcp-git-intel
                topologyKey: kubernetes.io/hostname

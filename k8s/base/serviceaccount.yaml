apiVersion: v1
kind: ServiceAccount
metadata:
  name: mcp-git-intel
  namespace: mcp-git-intel
  labels:
    app.kubernetes.io/name: mcp-git-intel
    app.kubernetes.io/component: server
  annotations:
    # AWS IRSA — uncomment and set ARN for your environment
    # eks.amazonaws.com/role-arn: arn:aws:iam::ACCOUNT_ID:role/gitintel-mcp-role
    # Azure Workload Identity — uncomment and set client ID
    # azure.workload.identity/client-id: CLIENT_ID
automountServiceAccountToken: false
